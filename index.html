<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#002d5a" />
<title>Giveaway Picker</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect width='24' height='24' rx='6' fill='%23002d5a'/><path d='M12 18.5s5-2.6 5-6.6V6l-5-2-5 2v5.9c0 4 5 6.6 5 6.6z' fill='none' stroke='white' stroke-width='1.6' stroke-linejoin='round'/></svg>" />
<style>
  :root{
    --blue:#002d5a; --blue-dark:#0b3d70; --blue-light:#eef3f8;
    --green:#1f9d57; --red:#d70019;
    --ink:#0f1b2d; --muted:#64748b; --line:#e8ebf0;
    --bg:#f4f6f9; --card:#ffffff; --danger:#c0392b; --radius:12px;
    --shadow:0 1px 2px rgba(15,27,45,.04), 0 1px 3px rgba(15,27,45,.05);
    --shadow-lg:0 8px 30px rgba(15,27,45,.12);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--ink); font-size:16px; line-height:1.45;
    -webkit-font-smoothing:antialiased; min-height:100dvh;
  }
  input{font-family:inherit; font-size:16px}
  button{font-family:inherit; cursor:pointer}

  /* header banner */
  .hero{
    background:linear-gradient(165deg,#013a73 0%, #002d5a 55%, #001f3f 100%);
    color:#fff; padding:30px 20px 26px; padding-top:max(30px,env(safe-area-inset-top));
    text-align:center;
  }
  .brand-logo{width:56px; height:56px; margin:0 auto 12px; border-radius:14px;
    background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.25);
    color:#fff; display:flex; align-items:center; justify-content:center}
  .brand-logo svg{width:30px; height:30px}
  .hero h1{margin:0 0 3px; font-size:23px; font-weight:700; letter-spacing:-.02em}
  .hero p{margin:0; color:rgba(255,255,255,.75); font-size:14px}

  .wrap{max-width:560px; margin:0 auto; padding:18px 16px 60px}

  /* winner reveal */
  #winner{
    text-align:center; padding:26px 20px; border-radius:18px; margin-bottom:18px;
    background:linear-gradient(165deg,#013a73 0%, #002d5a 55%, #001f3f 100%);
    color:#fff; box-shadow:var(--shadow-lg); display:none;
  }
  #winner.show{display:block; animation:pop .4s ease}
  @keyframes pop{0%{transform:scale(.9); opacity:0}100%{transform:scale(1); opacity:1}}
  #winner .label{font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:rgba(255,255,255,.7)}
  #winner .wname{font-size:2rem; font-weight:800; margin:8px 0 4px; letter-spacing:-.02em}
  #winner .wphone{font-size:1.05rem; color:rgba(255,255,255,.85)}

  /* cards */
  .card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:18px; box-shadow:var(--shadow); margin-bottom:16px}
  .field{display:flex; flex-direction:column; gap:6px; margin-bottom:14px}
  .field:last-child{margin-bottom:0}
  .field label{font-size:13px; font-weight:600; color:var(--muted)}
  .field input{padding:12px 13px; border:1px solid var(--line); border-radius:10px; background:#fff; color:var(--ink); width:100%}
  .field input:focus{outline:none; border-color:var(--blue); box-shadow:0 0 0 3px rgba(0,45,90,.12)}

  /* buttons */
  .btn{display:inline-flex; align-items:center; justify-content:center; gap:8px;
    border:1px solid var(--line); background:#fff; color:var(--ink);
    padding:12px 16px; border-radius:var(--radius); font-size:15px; font-weight:600; line-height:1}
  .btn:active{transform:translateY(.5px)}
  .btn-primary{background:var(--blue); border-color:var(--blue); color:#fff}
  .btn-primary:active{background:var(--blue-dark)}
  .btn-block{display:flex; width:100%}
  .btn:disabled{opacity:.55; cursor:not-allowed}
  .btn-pick{width:100%; font-size:1.1rem; padding:16px; margin-bottom:8px}
  .add-row{display:flex; gap:10px; align-items:flex-end}
  .add-row .field{flex:1; margin-bottom:0}
  .btn-add{flex-shrink:0}

  .status{text-align:center; color:var(--muted); font-size:.82rem; min-height:18px; margin-bottom:12px}

  /* list */
  .count{font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin:0 2px 12px}
  .list-item{background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:11px 13px; margin-bottom:9px; box-shadow:var(--shadow); display:flex; gap:11px; align-items:center}
  .list-item.winner{border-color:var(--green); box-shadow:0 0 0 1px var(--green)}
  .li-ic{width:38px; height:38px; border-radius:10px; background:var(--blue-light); color:var(--blue);
    display:flex; align-items:center; justify-content:center; flex-shrink:0; font-weight:700; font-size:15px}
  .li-ic.ok{background:#e7f6ee; color:var(--green)}
  .li-main{flex:1; min-width:0}
  .li-title{font-weight:650; font-size:15px; letter-spacing:-.01em}
  .li-sub{font-size:13px; color:var(--muted); margin-top:1px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .badge{font-size:10px; font-weight:700; color:var(--green); border:1px solid var(--green);
    border-radius:99px; padding:2px 8px; margin-left:6px; vertical-align:middle}
  .del{border:none; background:none; color:var(--muted); font-size:1.3rem; padding:4px 8px; line-height:1; flex-shrink:0}
  .del:active{color:var(--red)}
  .empty{text-align:center; color:var(--muted); padding:34px 16px; font-size:14px}
  .toolbar{display:flex; gap:8px; margin-top:12px}
  .toolbar .btn{flex:1; font-size:13px; color:var(--muted)}
</style>
</head>
<body>
  <div class="hero">
    <div class="brand-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    </div>
    <h1>Giveaway Picker</h1>
    <p>Add entries, then draw a random winner</p>
  </div>

  <div class="wrap">
    <div id="winner">
      <div class="label">Winner</div>
      <div class="wname">—</div>
      <div class="wphone"></div>
    </div>

    <div class="card">
      <div class="add-row">
        <div class="field">
          <label>Name</label>
          <input id="name" placeholder="Jane Doe" autocomplete="off" />
        </div>
        <button class="btn btn-primary btn-add" id="addBtn">Add</button>
      </div>
      <div class="field" style="margin-top:14px">
        <label>Phone number</label>
        <input id="phone" placeholder="(555) 123-4567" autocomplete="off" inputmode="tel" />
      </div>
    </div>

    <button class="btn btn-primary btn-pick" id="pickBtn">🎲 &nbsp;Pick a Winner</button>
    <div class="status" id="status"></div>

    <div class="card">
      <div class="count" id="count">Loading…</div>
      <div id="list"></div>
      <div class="toolbar">
        <button class="btn" id="resetWinsBtn">Reset winners</button>
        <button class="btn" id="clearBtn">Clear all</button>
      </div>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://xsnjxqruybhxdandcmol.supabase.co";
const SUPABASE_KEY = "sb_publishable_msOG_LBZ7XNX69w14ksCEQ_sYtmV8yD";
const TABLE = "giveaway_entries";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const $ = (id) => document.getElementById(id);
let entries = [];

function setStatus(msg) { $("status").textContent = msg || ""; }

async function load() {
  const { data, error } = await db.from(TABLE).select("*").order("created_at", { ascending: true });
  if (error) { setStatus("Error loading: " + error.message); return; }
  entries = data || [];
  render();
}

function render() {
  const list = $("list");
  $("count").textContent = entries.length
    ? `${entries.length} ${entries.length === 1 ? "entry" : "entries"}`
    : "Entries";
  if (!entries.length) {
    list.innerHTML = '<div class="empty">No entries yet. Add some above 👆</div>';
    return;
  }
  list.innerHTML = "";
  entries.forEach((e) => {
    const div = document.createElement("div");
    div.className = "list-item" + (e.won ? " winner" : "");
    const initial = escapeHtml((e.name || "?").trim().charAt(0).toUpperCase() || "?");
    div.innerHTML = `
      <div class="li-ic${e.won ? " ok" : ""}">${initial}</div>
      <div class="li-main">
        <div class="li-title">${escapeHtml(e.name)}${e.won ? '<span class="badge">WON</span>' : ""}</div>
        ${e.phone ? `<div class="li-sub">${escapeHtml(e.phone)}</div>` : ""}
      </div>
      <button class="del" title="Remove">&times;</button>`;
    div.querySelector(".del").onclick = () => remove(e.id);
    list.appendChild(div);
  });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

async function add() {
  const name = $("name").value.trim();
  const phone = $("phone").value.trim();
  if (!name) { setStatus("Enter a name first."); $("name").focus(); return; }
  $("addBtn").disabled = true;
  const { error } = await db.from(TABLE).insert({ name, phone: phone || null });
  $("addBtn").disabled = false;
  if (error) { setStatus("Error adding: " + error.message); return; }
  $("name").value = ""; $("phone").value = "";
  $("name").focus();
  setStatus("");
  await load();
}

async function remove(id) {
  const { error } = await db.from(TABLE).delete().eq("id", id);
  if (error) { setStatus("Error removing: " + error.message); return; }
  await load();
}

async function pick() {
  const pool = entries.filter((e) => !e.won);
  if (!pool.length) {
    setStatus(entries.length ? "Everyone has already won. Reset winners to draw again." : "Add some entries first.");
    return;
  }
  const btn = $("pickBtn");
  btn.disabled = true;
  const winnerBox = $("winner");
  winnerBox.classList.add("show");

  let ticks = 18;
  await new Promise((resolve) => {
    const spin = setInterval(() => {
      const r = pool[Math.floor(Math.random() * pool.length)];
      winnerBox.querySelector(".wname").textContent = r.name;
      winnerBox.querySelector(".wphone").textContent = r.phone || "";
      if (--ticks <= 0) { clearInterval(spin); resolve(); }
    }, 80);
  });

  const winner = pool[Math.floor(Math.random() * pool.length)];
  winnerBox.querySelector(".wname").textContent = winner.name;
  winnerBox.querySelector(".wphone").textContent = winner.phone || "";

  await db.from(TABLE).update({ won: true }).eq("id", winner.id);
  btn.disabled = false;
  setStatus("🎊 Winner recorded!");
  await load();
}

async function resetWins() {
  if (!confirm("Reset all winner flags so everyone is eligible again?")) return;
  const { error } = await db.from(TABLE).update({ won: false }).neq("id", "00000000-0000-0000-0000-000000000000");
  if (error) { setStatus("Error: " + error.message); return; }
  $("winner").classList.remove("show");
  setStatus("Winners reset.");
  await load();
}

async function clearAll() {
  if (!confirm("Delete ALL entries? This cannot be undone.")) return;
  const { error } = await db.from(TABLE).delete().neq("id", "00000000-0000-0000-0000-000000000000");
  if (error) { setStatus("Error: " + error.message); return; }
  $("winner").classList.remove("show");
  setStatus("All entries cleared.");
  await load();
}

$("addBtn").onclick = add;
$("pickBtn").onclick = pick;
$("resetWinsBtn").onclick = resetWins;
$("clearBtn").onclick = clearAll;
$("phone").addEventListener("keydown", (e) => { if (e.key === "Enter") add(); });
$("name").addEventListener("keydown", (e) => { if (e.key === "Enter") $("phone").focus(); });

load();
</script>
</body>
</html>
