<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#2f4a7c" />
<title>Giveaway Picker · Insure With Cierra</title>
<link rel="icon" type="image/png" href="favicon-64.png" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Picker" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --card:#ffffff; --text:#1e2d2f; --ink:#16243f;
    --accent:#2f4a7c; --accent-dark:#1d2f52;
    --green:#5f7244; --green-dark:#46552f; --gold:#f5b301;
    --muted:#4b6668; --muted-2:#5b6b78; --muted-light:#b7cfd4;
    --line:rgba(15,23,42,.10);
    --shadow:0 22px 60px rgba(22,36,63,.18);
    --shadow-sm:0 10px 30px rgba(15,23,42,.08);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:'Space Grotesk', system-ui, -apple-system, sans-serif;
    color:var(--text); font-size:16px; line-height:1.5; min-height:100dvh;
    background:radial-gradient(circle at 15% 10%, #fbfdfb 0, #eef4ef 28%, #e3eded 55%, #cfe0e1 80%, #b9d2d4 100%);
    background-attachment:fixed;
    -webkit-font-smoothing:antialiased;
  }
  input{font-family:inherit; font-size:16px}
  button{font-family:inherit; cursor:pointer}

  .wrap{max-width:560px; margin:0 auto; padding:26px 16px 60px}

  /* brand header */
  .brand{display:flex; align-items:center; gap:12px; justify-content:center; margin-bottom:8px}
  .brand-badge{height:52px; width:auto; flex-shrink:0; object-fit:contain}
  .brand-text{text-align:left}
  .brand-name{font-family:'Poppins',sans-serif; font-weight:600; line-height:1.15; color:var(--ink); font-size:18px}
  .brand-sub{color:var(--muted); font-size:12.5px}
  .page-title{text-align:center; font-family:'Poppins',sans-serif; font-weight:700; color:var(--ink);
    font-size:26px; letter-spacing:-.01em; margin:18px 0 2px}
  .page-lede{text-align:center; color:var(--muted); font-size:14px; margin:0 0 22px}

  /* winner reveal */
  #winner{
    text-align:center; padding:28px 20px; border-radius:22px; margin-bottom:20px;
    background:linear-gradient(145deg, rgba(47,74,124,.97), rgba(29,47,82,.96));
    color:#fff; box-shadow:var(--shadow); display:none;
  }
  #winner.show{display:block; animation:pop .4s ease}
  @keyframes pop{0%{transform:scale(.92); opacity:0}100%{transform:scale(1); opacity:1}}
  #winner .label{font-family:'Poppins',sans-serif; font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--gold)}
  #winner .wname{font-family:'Poppins',sans-serif; font-size:2.05rem; font-weight:700; margin:8px 0 4px; letter-spacing:-.02em}
  #winner .wphone{font-size:1.05rem; color:rgba(255,255,255,.85)}

  /* cards */
  .card{background:var(--card); border:1px solid var(--line); border-radius:18px;
    padding:20px; box-shadow:var(--shadow-sm); margin-bottom:16px}
  .field{display:flex; flex-direction:column; gap:6px; margin-bottom:14px}
  .field:last-child{margin-bottom:0}
  .field label{font-size:13px; font-weight:600; color:var(--muted)}
  .field input{padding:13px; border:1px solid var(--line); border-radius:12px; background:#fff; color:var(--ink); width:100%}
  .field input:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(47,74,124,.14)}

  /* buttons */
  .btn{display:inline-flex; align-items:center; justify-content:center; gap:8px; border:none;
    background:var(--accent); color:#fff; padding:12px 20px; border-radius:12px;
    font-family:'Poppins',sans-serif; font-weight:700; font-size:15px;
    box-shadow:0 14px 28px rgba(47,74,124,.30);
    transition:transform .12s ease, background .2s ease, box-shadow .2s ease}
  .btn:hover{transform:translateY(-1px); background:var(--accent-dark); box-shadow:0 18px 34px rgba(47,74,124,.38)}
  .btn:active{transform:translateY(0)}
  .btn:disabled{opacity:.55; cursor:not-allowed; transform:none; box-shadow:none}
  .btn-block{display:flex; width:100%}
  .btn-pick{width:100%; font-size:17px; padding:16px; margin-bottom:8px}
  .btn-ghost{background:rgba(47,74,124,.06); color:var(--accent-dark); box-shadow:none; font-weight:600}
  .btn-ghost:hover{background:rgba(47,74,124,.12); color:var(--accent-dark); box-shadow:none; transform:none}
  .add-row{display:flex; gap:10px; align-items:flex-end}
  .add-row .field{flex:1; margin-bottom:0}

  .status{text-align:center; color:var(--muted); font-size:.85rem; min-height:18px; margin-bottom:12px}

  /* list */
  .count{font-family:'Poppins',sans-serif; font-size:12px; font-weight:600; text-transform:uppercase;
    letter-spacing:.05em; color:var(--muted); margin:0; padding:2px; width:100%;
    display:flex; align-items:center; justify-content:space-between;
    background:none; border:none; cursor:pointer}
  .count .caret{font-size:11px; transition:transform .15s ease}
  #list{margin-top:12px}
  #list.collapsed{display:none}
  .list-item{background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:11px 13px; margin-bottom:9px; box-shadow:var(--shadow-sm); display:flex; gap:11px; align-items:center}
  .list-item.winner{border-color:var(--green); box-shadow:0 0 0 1px var(--green)}
  .li-ic{width:40px; height:40px; border-radius:50%; background:#e9eef7; color:var(--accent);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
    font-family:'Poppins',sans-serif; font-weight:700; font-size:15px}
  .li-ic.ok{background:#eaf0e2; color:var(--green)}
  .li-main{flex:1; min-width:0}
  .li-title{font-weight:600; font-size:15px; letter-spacing:-.01em; color:var(--ink); font-family:'Poppins',sans-serif}
  .li-sub{font-size:13px; color:var(--muted); margin-top:1px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .badge{font-family:'Poppins',sans-serif; font-size:10px; font-weight:600; color:var(--green);
    border:1px solid var(--green); border-radius:99px; padding:2px 8px; margin-left:6px; vertical-align:middle}
  .del{border:none; background:none; color:var(--muted-light); font-size:1.4rem; padding:4px 8px; line-height:1; flex-shrink:0}
  .del:hover{color:var(--accent)}
  .empty{text-align:center; color:var(--muted); padding:34px 16px; font-size:14px}
  .toolbar{display:flex; gap:8px; margin-top:12px}
  .toolbar .btn{flex:1; font-size:13px}
  .foot{display:flex; align-items:center; justify-content:center; gap:12px; margin-top:14px; flex-wrap:wrap}
  .foot .btn{font-size:12px}
  .foot-ver{color:var(--muted); font-size:11px}

  /* drawing overlay */
  .draw-overlay{position:fixed; inset:0; z-index:90; display:flex; align-items:center; justify-content:center;
    text-align:center; color:#fff; overflow:hidden;
    background:linear-gradient(145deg, rgba(47,74,124,.98), rgba(29,47,82,.98))}
  .draw-overlay.hidden{display:none}
  .draw-stage{position:absolute; inset:0; z-index:1; pointer-events:none; overflow:hidden}
  .float-name{position:absolute; transform:translate(-50%,-50%); white-space:nowrap;
    font-family:'Poppins',sans-serif; font-weight:600; color:rgba(255,255,255,.5);
    animation:floatfade 2.4s ease forwards}
  @keyframes floatfade{
    0%{opacity:0; transform:translate(-50%,-50%) scale(.85)}
    20%{opacity:.7} 70%{opacity:.7}
    100%{opacity:0; transform:translate(-50%,-50%) scale(1.1)}}
  .draw-center{position:relative; z-index:2; padding:20px; max-width:92vw}
  .draw-logo{display:block; width:104px; height:104px; margin:0 auto 18px; border-radius:50%;
    object-fit:cover; border:3px solid rgba(255,255,255,.85);
    box-shadow:0 8px 22px rgba(0,0,0,.35)}
  .draw-caption{font-family:'Poppins',sans-serif; text-transform:uppercase; letter-spacing:.18em;
    font-size:13px; color:var(--gold); margin-bottom:10px}
  .draw-big{font-family:'Poppins',sans-serif; font-weight:700; font-size:clamp(46px,10vw,96px);
    line-height:1.05; letter-spacing:-.02em; text-shadow:0 10px 40px rgba(0,0,0,.35); word-break:break-word;
    /* reserve 2 lines so wrapping names don't resize the block and bounce the logo */
    min-height:2.1em; display:flex; align-items:center; justify-content:center; overflow:hidden}
  .draw-phone{margin-top:10px; font-size:1.1rem; color:rgba(255,255,255,.85); min-height:22px}
  .draw-close{position:absolute; top:16px; right:18px; z-index:3; width:42px; height:42px; border-radius:50%;
    background:rgba(255,255,255,.14); border:1px solid rgba(255,255,255,.3); color:#fff;
    font-size:22px; line-height:1; cursor:pointer}
  .draw-close:hover{background:rgba(255,255,255,.24)}
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <img class="brand-badge" src="logo-440.webp" alt="Insure With Cierra" />
      <div class="brand-text">
        <div class="brand-name">Insure With Cierra</div>
        <div class="brand-sub">No spam · No pressure · Just honest help</div>
      </div>
    </div>

    <h1 class="page-title">Giveaway Picker</h1>
    <p class="page-lede">Add entries, then draw a random winner</p>

    <div id="winner">
      <div class="label">Winner</div>
      <div class="wname">—</div>
      <div class="wphone"></div>
    </div>

    <div class="card">
      <div class="add-row">
        <div class="field">
          <label>Name</label>
          <input id="name" placeholder="Jane Doe" autocomplete="off" />
        </div>
        <button class="btn" id="addBtn">Add</button>
      </div>
      <div class="field" style="margin-top:14px">
        <label>Phone number</label>
        <input id="phone" placeholder="(555) 123-4567" autocomplete="off" inputmode="tel" />
      </div>
    </div>

    <button class="btn btn-pick" id="pickBtn">Launch Drawing</button>
    <div class="status" id="status"></div>

    <div class="card">
      <button class="count" id="listToggle" aria-expanded="false">
        <span id="count">Loading…</span>
        <span class="caret" id="caret">▸</span>
      </button>
      <div id="list" class="collapsed"></div>
      <div class="toolbar">
        <button class="btn btn-ghost" id="seedBtn">Load 20 test names</button>
        <button class="btn btn-ghost" id="resetWinsBtn">Reset winners</button>
        <button class="btn btn-ghost" id="clearBtn">Clear all</button>
      </div>
    </div>

    <footer class="foot">
      <button class="btn btn-ghost" id="updateBtn">Force update</button>
      <span class="foot-ver" id="ver"></span>
    </footer>
  </div>

  <!-- full-screen drawing overlay -->
  <div id="drawOverlay" class="draw-overlay hidden">
    <button class="draw-close" id="drawClose" title="Close">&times;</button>
    <div class="draw-stage" id="drawStage"></div>
    <div class="draw-center">
      <img class="draw-logo" src="logo-440.webp" alt="Insure With Cierra" />
      <div class="draw-caption" id="drawCaption">Get Ready</div>
      <div class="draw-big" id="drawBig"></div>
      <div class="draw-phone" id="drawPhone"></div>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script>
const SUPABASE_URL = "https://xsnjxqruybhxdandcmol.supabase.co";
const SUPABASE_KEY = "sb_publishable_msOG_LBZ7XNX69w14ksCEQ_sYtmV8yD";
const TABLE = "giveaway_entries";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const APP_VERSION = "1.2";
const $ = (id) => document.getElementById(id);
let entries = [];
let listOpen = false;

// Wipe the cached app (service worker + caches) and reload the very latest version.
async function forceUpdate() {
  setStatus("Updating…");
  try {
    if ("serviceWorker" in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map((r) => r.unregister()));
    }
    if (window.caches) {
      const keys = await caches.keys();
      await Promise.all(keys.map((k) => caches.delete(k)));
    }
  } catch (e) { /* ignore */ }
  const base = location.href.split("?")[0].split("#")[0];
  location.replace(base + "?u=" + Date.now());
}

function applyListState() {
  $("list").classList.toggle("collapsed", !listOpen);
  $("listToggle").setAttribute("aria-expanded", String(listOpen));
  $("caret").textContent = listOpen ? "▾" : "▸";
}
function toggleList() { listOpen = !listOpen; applyListState(); render(); }

function setStatus(msg) { $("status").textContent = msg || ""; }

async function load() {
  const { data, error } = await db.from(TABLE).select("*").order("created_at", { ascending: true });
  if (error) { setStatus("Error loading: " + error.message); return; }
  entries = data || [];
  render();
}

function render() {
  const list = $("list");
  $("count").textContent = entries.length
    ? `${entries.length} ${entries.length === 1 ? "entry" : "entries"} · ${listOpen ? "hide" : "show"}`
    : "Entries";
  if (!entries.length) {
    list.innerHTML = '<div class="empty">No entries yet. Add some above.</div>';
    return;
  }
  list.innerHTML = "";
  entries.forEach((e) => {
    const div = document.createElement("div");
    div.className = "list-item" + (e.won ? " winner" : "");
    const initial = escapeHtml((e.name || "?").trim().charAt(0).toUpperCase() || "?");
    div.innerHTML = `
      <div class="li-ic${e.won ? " ok" : ""}">${initial}</div>
      <div class="li-main">
        <div class="li-title">${escapeHtml(displayName(e.name))}${e.won ? '<span class="badge">WON</span>' : ""}</div>
      </div>
      <button class="del" title="Remove">&times;</button>`;
    div.querySelector(".del").onclick = () => remove(e.id);
    list.appendChild(div);
  });
}

// Show first name + last initial for privacy (e.g. "Jordan Bennett" -> "Jordan B.").
function displayName(name) {
  const parts = String(name || "").trim().split(/\s+/).filter(Boolean);
  if (parts.length <= 1) return parts[0] || "";
  return parts[0] + " " + parts[parts.length - 1].charAt(0).toUpperCase() + ".";
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

async function add() {
  const name = $("name").value.trim();
  const phone = $("phone").value.trim();
  if (!name) { setStatus("Enter a name first."); $("name").focus(); return; }
  $("addBtn").disabled = true;
  const { error } = await db.from(TABLE).insert({ name, phone: phone || null });
  $("addBtn").disabled = false;
  if (error) { setStatus("Error adding: " + error.message); return; }
  $("name").value = ""; $("phone").value = "";
  $("name").focus();
  setStatus("");
  await load();
}

async function remove(id) {
  const { error } = await db.from(TABLE).delete().eq("id", id);
  if (error) { setStatus("Error removing: " + error.message); return; }
  await load();
}

const COUNTDOWN_SECS = 30;
const SHUFFLE_SECS = 15;
let drawAbort = false;
let drawTimers = [];

function openOverlay() {
  drawAbort = false;
  drawTimers = [];
  $("drawStage").innerHTML = "";
  $("drawCaption").textContent = "Get Ready";
  $("drawBig").textContent = "";
  $("drawPhone").textContent = "";
  $("pickBtn").disabled = true;
  $("drawOverlay").classList.remove("hidden");
}

function closeOverlay() {
  drawAbort = true;
  drawTimers.forEach(clearTimeout);
  drawTimers = [];
  $("drawStage").innerHTML = "";
  $("drawOverlay").classList.add("hidden");
  $("pickBtn").disabled = false;
}

function spawnFloatName(pool) {
  const e = pool[Math.floor(Math.random() * pool.length)];
  const span = document.createElement("span");
  span.className = "float-name";
  span.textContent = displayName(e.name);
  // Keep names in the left/right side columns so they never cross the centered logo + countdown.
  const onLeft = Math.random() < 0.5;
  span.style.left = (onLeft ? 3 + Math.random() * 21 : 76 + Math.random() * 21) + "%";
  span.style.top = (8 + Math.random() * 84) + "%";
  span.style.fontSize = (18 + Math.random() * 30) + "px";
  $("drawStage").appendChild(span);
  const id = setTimeout(() => span.remove(), 2400);
  drawTimers.push(id);
}

// Phase 1: countdown while names fade in/out at random.
function countdownPhase(pool) {
  return new Promise((resolve) => {
    $("drawCaption").textContent = "Drawing starts in";
    $("drawPhone").textContent = "";
    const start = performance.now();
    let lastShown = null, lastSpawn = 0;
    function frame(now) {
      if (drawAbort) return resolve();
      const elapsed = now - start;
      const remaining = Math.max(0, Math.ceil((COUNTDOWN_SECS * 1000 - elapsed) / 1000));
      if (remaining !== lastShown) { $("drawBig").textContent = remaining; lastShown = remaining; }
      if (now - lastSpawn > 300) { spawnFloatName(pool); lastSpawn = now; }
      if (elapsed >= COUNTDOWN_SECS * 1000) return resolve();
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  });
}

// Phase 2: fast shuffle that eases out, returns the chosen winner.
function shufflePhase(pool) {
  return new Promise((resolve) => {
    $("drawStage").innerHTML = "";
    $("drawCaption").textContent = "Drawing…";
    const DURATION = SHUFFLE_SECS * 1000;
    const start = performance.now();
    function tick() {
      if (drawAbort) return resolve(null);
      const elapsed = performance.now() - start;
      const r = pool[Math.floor(Math.random() * pool.length)];
      $("drawBig").textContent = displayName(r.name);
      if (elapsed >= DURATION) return resolve(pool[Math.floor(Math.random() * pool.length)]);
      const p = elapsed / DURATION;
      const delay = 45 + Math.pow(p, 3) * 560; // 45ms early → ~600ms at the end
      const id = setTimeout(tick, delay);
      drawTimers.push(id);
    }
    tick();
  });
}

async function launchDraw() {
  const pool = entries.filter((e) => !e.won);
  if (!pool.length) {
    setStatus(entries.length ? "Everyone has already won. Reset winners to draw again." : "Add some entries first.");
    return;
  }
  openOverlay();
  await countdownPhase(pool);
  if (drawAbort) return;
  const winner = await shufflePhase(pool);
  if (drawAbort || !winner) return;

  // reveal
  $("drawCaption").textContent = "Winner";
  $("drawBig").textContent = displayName(winner.name);
  celebrate();

  await db.from(TABLE).update({ won: true }).eq("id", winner.id);

  // reflect on the page behind the overlay
  const winnerBox = $("winner");
  winnerBox.querySelector(".label").textContent = "Winner";
  winnerBox.querySelector(".wname").textContent = displayName(winner.name);
  winnerBox.querySelector(".wphone").textContent = "";
  winnerBox.classList.add("show");
  setStatus("Winner recorded.");
  await load();
}

function celebrate() {
  if (typeof confetti !== "function") return;
  const colors = ["#2f4a7c", "#5f7244", "#f5b301", "#ffffff", "#1d2f52"];
  const end = performance.now() + 1500;
  // opening burst
  confetti({ particleCount: 140, spread: 90, startVelocity: 45, origin: { y: 0.35 }, colors });
  // streamers from both bottom corners
  (function frame() {
    confetti({ particleCount: 5, angle: 60, spread: 60, origin: { x: 0, y: 0.7 }, colors });
    confetti({ particleCount: 5, angle: 120, spread: 60, origin: { x: 1, y: 0.7 }, colors });
    if (performance.now() < end) requestAnimationFrame(frame);
  })();
}

async function seed() {
  const firsts = ["Jordan","Casey","Riley","Taylor","Morgan","Avery","Cameron","Skyler","Devon","Reese",
    "Hayden","Peyton","Quinn","Rowan","Emerson","Finley","Harper","Kendall","Logan","Marley"];
  const lasts = ["Bennett","Carter","Diaz","Ellis","Fisher","Grant","Hayes","Irwin","Jensen","Klein",
    "Lowe","Mora","Nash","Owens","Park","Reyes","Stone","Tran","Vance","Wells"];
  const shuffled = [...lasts].sort(() => Math.random() - 0.5);
  const rows = firsts.map((f, i) => {
    const n = 2000000000 + Math.floor(Math.random() * 7999999999);
    const s = String(n);
    return { name: `${f} ${shuffled[i]}`, phone: `(${s.slice(0,3)}) ${s.slice(3,6)}-${s.slice(6,10)}` };
  });
  $("seedBtn").disabled = true;
  const { error } = await db.from(TABLE).insert(rows);
  $("seedBtn").disabled = false;
  if (error) { setStatus("Error seeding: " + error.message); return; }
  setStatus("Added 20 test names.");
  await load();
}

async function resetWins() {
  if (!confirm("Reset all winner flags so everyone is eligible again?")) return;
  const { error } = await db.from(TABLE).update({ won: false }).neq("id", "00000000-0000-0000-0000-000000000000");
  if (error) { setStatus("Error: " + error.message); return; }
  $("winner").classList.remove("show");
  setStatus("Winners reset.");
  await load();
}

async function clearAll() {
  if (!confirm("Delete ALL entries? This cannot be undone.")) return;
  const { error } = await db.from(TABLE).delete().neq("id", "00000000-0000-0000-0000-000000000000");
  if (error) { setStatus("Error: " + error.message); return; }
  $("winner").classList.remove("show");
  setStatus("All entries cleared.");
  await load();
}

$("addBtn").onclick = add;
$("pickBtn").onclick = launchDraw;
$("seedBtn").onclick = seed;
$("drawClose").onclick = closeOverlay;
$("listToggle").onclick = toggleList;
$("updateBtn").onclick = forceUpdate;
$("ver").textContent = "build " + APP_VERSION;
applyListState();
$("resetWinsBtn").onclick = resetWins;
$("clearBtn").onclick = clearAll;
$("phone").addEventListener("keydown", (e) => { if (e.key === "Enter") add(); });
$("name").addEventListener("keydown", (e) => { if (e.key === "Enter") $("phone").focus(); });

load();

if ("serviceWorker" in navigator) {
